# Nginx reverse proxy - 100 Journeys Tencent Cloud deployment
# Production path: /etc/nginx/conf.d/100-journeys.conf

upstream journeys_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=journeys_api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=journeys_auth_limit:10m rate=5r/m;

server {
    listen 80 default_server;
    server_name 49.232.207.220 _;

    access_log /var/log/nginx/100-journeys.access.log;
    error_log /var/log/nginx/100-journeys.error.log warn;

    limit_req_status 429;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /static/ {
        alias /opt/100-journeys/app/web/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    location /api/auth/ {
        limit_req zone=journeys_auth_limit burst=10 nodelay;
        proxy_pass http://journeys_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=journeys_api_limit burst=20 nodelay;
        proxy_pass http://journeys_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /uploads/ {
        proxy_pass http://journeys_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://journeys_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}

# HTTPS note:
# After ICP filing and domain DNS are ready, add a 443 server block with a valid
# certificate and redirect HTTP to HTTPS. The IP-only demo intentionally stays on
# HTTP because browser-trusted HTTPS requires a domain certificate.
